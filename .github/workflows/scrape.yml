# 毎朝JST 6:00 にイベント情報を自動収集して Supabase に pending 投入するワークフロー。
# 手動実行: GitHub → Actions → "Scrape dance events" → Run workflow
#
# 必要な Secrets (リポジトリの Settings → Secrets and variables → Actions):
#   SUPABASE_URL              … https://qvzamnypgjyipyneeqgs.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY … Supabase の Secret key (sb_secret_...)
#   GEMINI_API_KEY            … Google AI Studio で発行したAPIキー(無料枠。設定時はこちらが優先される)
#   ANTHROPIC_API_KEY         … console.anthropic.com で発行したAPIキー(GEMINI_API_KEY未設定時のフォールバック)
name: Scrape dance events

on:
  schedule:
    - cron: "0 21 * * *" # UTC 21:00 = JST 6:00
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        run: npx tsx scripts/scrape.ts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
